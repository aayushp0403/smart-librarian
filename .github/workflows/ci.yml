name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build and Test (Ubuntu)
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          build-essential \
          cmake \
          ninja-build \
          git \
          tesseract-ocr \
          tesseract-ocr-eng \
          libtesseract-dev \
          libleptonica-dev \
          qt6-base-dev \
          libqt6widgets6 \
          qt6-tools-dev \
          libgl1-mesa-dev \
          libglu1-mesa-dev \
          libxcb-xinerama0-dev \
          libxcb-icccm4-dev \
          libxcb-image0-dev \
          libxcb-keysyms1-dev \
          libxcb-randr0-dev \
          libxcb-render-util0-dev \
          libxcb-xkb-dev \
          libxkbcommon-x11-dev \
          libxcb-cursor-dev \
          libgtest-dev

    # ── vcpkg only for stb (Tesseract comes from apt above) ──────────
    - name: Cache vcpkg
      uses: actions/cache@v4
      with:
        path: ~/vcpkg
        key: vcpkg-${{ runner.os }}-stb-v1
        restore-keys: vcpkg-${{ runner.os }}-

    - name: Setup vcpkg and install stb
      run: |
        if [ ! -d "$HOME/vcpkg" ]; then
          git clone https://github.com/microsoft/vcpkg.git ~/vcpkg
          ~/vcpkg/bootstrap-vcpkg.sh -disableMetrics
        fi
        ~/vcpkg/vcpkg install stb:x64-linux

    - name: Configure CMake
      run: |
        cmake -S . -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_TOOLCHAIN_FILE="$HOME/vcpkg/scripts/buildsystems/vcpkg.cmake" \
          -DCMAKE_CXX_FLAGS="-I$HOME/vcpkg/installed/x64-linux/include" \
          -DSL_USE_SYSTEM_TESSERACT=ON \
          -DSL_USE_SYSTEM_GTEST=ON

    - name: Build
      run: cmake --build build -- -j$(nproc)

    - name: Run unit tests
      run: |
        cd build
        ctest --output-on-failure \
              --parallel $(nproc) \
              --exclude-regex ".*gui.*" \
              --timeout 120

    # ── v4 fixes the deprecated v3 error ─────────────────────────────
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ github.run_id }}
        path: build/Testing/
        if-no-files-found: ignore

